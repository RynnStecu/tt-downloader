<script>
const urlInput = document.getElementById('urlInput');
const btnVideo = document.getElementById('btnVideo');
const btnAudio = document.getElementById('btnAudio');
const statusBox = document.getElementById('statusBox');
const statusIcon = document.getElementById('statusIcon');
const statusText = document.getElementById('statusText');

function toggleMenu() {
  document.getElementById('dropdown').classList.toggle('open');
}

document.addEventListener('click', e => {
  if (!e.target.closest('.menu-wrap')) document.getElementById('dropdown').classList.remove('open');
});

function showInfo() {
  document.getElementById('dropdown').classList.remove('open');
  setStatus('success', '✓', 'TikTok DL v1.0 · by @RynnStecu · gratis selamanya');
  setTimeout(clearStatus, 4000);
}

async function pasteClipboard() {
  try {
    const text = await navigator.clipboard.readText();
    if (text) { urlInput.value = text; urlInput.dispatchEvent(new Event('input')); }
  } catch (_) { urlInput.focus(); }
}

urlInput.addEventListener('input', () => {
  const v = urlInput.value.trim();
  const ok = v.includes('tiktok.com') && v.length > 15;
  btnVideo.disabled = !ok;
  btnAudio.disabled = !ok;
  urlInput.classList.toggle('valid', ok);
  if (!ok) clearStatus();
});

urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') downloadVideo(); });

function setStatus(type, icon, msg) {
  statusBox.className = 'status-box show ' + type;
  statusIcon.innerHTML = type === 'loading' ? '<span class="spin-icon">' + icon + '</span>' : icon;
  statusText.textContent = msg;
}

function clearStatus() { statusBox.className = 'status-box'; }

function setBtns(disabled) {
  const ok = !disabled && urlInput.value.trim().includes('tiktok.com');
  btnVideo.disabled = disabled ? true : !ok;
  btnAudio.disabled = disabled ? true : !ok;
}

async function getLink(url, type) {
  const apis = [
    'https://www.tikwm.com/api/?url=' + encodeURIComponent(url),
    'https://api.tikmate.app/api/lookup?url=' + encodeURIComponent(url),
  ];
  for (const api of apis) {
    try {
      const r = await fetch(api);
      const d = await r.json();
      const s = d.data || d;
      if (type === 'video' && s.play) return s.play;
      if (type === 'video' && s.nwm_video_url) return s.nwm_video_url;
      if (type === 'audio' && s.music) return s.music;
      if (type === 'audio' && s.music_info && s.music_info.play) return s.music_info.play;
    } catch (_) {}
  }
  return null;
}

async function triggerDownload(fileUrl, name, mime) {
  try {
    const res = await fetch(fileUrl);
    if (!res.ok) throw new Error();
    const blob = await res.blob();
    const burl = URL.createObjectURL(new Blob([blob], { type: mime }));
    const a = document.getElementById('dlLink');
    a.href = burl; a.download = name; a.click();
    setTimeout(() => URL.revokeObjectURL(burl), 200);
  } catch (_) {
    const a = document.getElementById('dlLink');
    a.href = fileUrl; a.download = name; a.target = '_blank'; a.click(); a.target = '';
  }
}

async function downloadVideo() {
  const url = urlInput.value.trim();
  if (!url) return;
  setBtns(true);
  setStatus('loading', '◌', 'Mengambil link video…');
  try {
    const link = await getLink(url, 'video');
    if (!link) { setStatus('error', '✕', 'Gagal — coba URL lain atau cek koneksi'); setBtns(false); return; }
    setStatus('loading', '◌', 'Mengunduh file…');
    await triggerDownload(link, 'tiktok_video.mp4', 'video/mp4');
    setStatus('success', '✓', 'Video berhasil diunduh!');
    setTimeout(clearStatus, 4000);
  } catch (_) {
    setStatus('error', '✕', 'Terjadi kesalahan, coba lagi');
  }
  setBtns(false);
}

async function downloadAudio() {
  const url = urlInput.value.trim();
  if (!url) return;
  setBtns(true);
  setStatus('loading', '◌', 'Mengambil link audio…');
  try {
    const link = await getLink(url, 'audio');
    if (!link) { setStatus('error', '✕', 'Gagal — coba URL lain atau cek koneksi'); setBtns(false); return; }
    setStatus('loading', '◌', 'Mengunduh audio…');
    await triggerDownload(link, 'tiktok_audio.mp3', 'audio/mpeg');
    setStatus('success', '✓', 'MP3 berhasil diunduh!');
    setTimeout(clearStatus, 4000);
  } catch (_) {
    setStatus('error', '✕', 'Terjadi kesalahan, coba lagi');
  }
  setBtns(false);
}
